AllCops:
  TargetRubyVersion: 2.7
  NewCops: enable
  Exclude:
    - 'vendor/**/*'
    - 'spec/fixtures/**/*'

# Adjust line length for readability
Layout/LineLength:
  Max: 120

# Allow longer methods for processors
Metrics/MethodLength:
  Max: 25
  Exclude:
    - 'spec/**/*'

# Allow longer classes for processors
Metrics/ClassLength:
  Max: 250

# Allow longer blocks in specs
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

# Prefer modern Ruby string literals
Style/StringLiterals:
  EnforcedStyle: single_quotes

# Prefer documentation on public classes
Style/Documentation:
  Enabled: false  # Enable if you want YARD docs enforced
